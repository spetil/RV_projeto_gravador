<!DOCTYPE html>
<html>
  <head>

    <title>experiência de RA</title>

    <a-scene vr-mode-ui='enabled: false' arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false' renderer='antialias: true; alpha: true'>

      <a-entity material='color: red' geometry='primitive: box' gps-new-entity-place="latitude: -4.979991076004118; longitude: -39.05593834243967" scale="10 10 10"></a-entity>
    </a-scene>
  </body>
