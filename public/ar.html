<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Experiência de RA com Áudio</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      #debug-panel {
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.75);
        color: #fff;
        font-family: monospace;
        font-size: 0.8rem;
        padding: 6px 10px;
        line-height: 1.6;
        pointer-events: none;
      }
      .ui-container {
        position: fixed;
        bottom: 30px; left: 50%;
        transform: translateX(-50%);
        z-index: 9999; text-align: center;
      }
      #play-btn {
        background-color: #ff2d55; color: white;
        padding: 15px 30px; border: none;
        border-radius: 50px; font-size: 1.1rem;
        font-family: monospace; font-weight: bold;
        cursor: pointer; display: none;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body style="margin:0;overflow:hidden;">

    <div id="debug-panel">🔄 Iniciando...</div>

    <div class="ui-container">
      <button id="play-btn">Carregando voz... ⏳</button>
    </div>

    <a-scene
      vr-mode-ui='enabled: false'
      arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false'
      renderer='antialias: true; alpha: true'
      loading-screen='enabled: false'
    >
      <a-assets timeout="15000">
        <a-asset-item id="meu-modelo3d" src="vintage radio.glb"></a-asset-item>
      </a-assets>

      <a-camera id="camera" gps-new-camera='gpsMinDistance: 5'></a-camera>

      <a-box
        id="cubo"
        color="red"
        gps-new-entity-place="latitude: -4.466122627460742; longitude: -38.90073652916311"
        scale="5 5 5">
      </a-box>

      <a-entity
        id="radio-model"
        gltf-model="#meu-modelo3d"
        gps-new-entity-place="latitude: -4.466122627460742; longitude: -38.90073652916311"
        scale="5 5 5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
      ></a-entity>
    </a-scene>

    <script>
      // ── Debug panel ───────────────────────────────────────────────────
      const debugEl = document.getElementById('debug-panel');
      const logLines = [];
      function log(msg) {
        logLines.unshift(msg);
        if (logLines.length > 6) logLines.pop();
        debugEl.innerHTML = logLines.join('<br>');
      }
      log('🔄 Iniciando...');

      // ── Coordenadas alvo ──────────────────────────────────────────────
      const TARGET_LAT = -4.466122627460742;
      const TARGET_LNG = -38.90073652916311;

      function calcDist(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dL = (lat2 - lat1) * Math.PI / 180;
        const dG = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dL/2)**2 +
                  Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dG/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      // ── FIX PRINCIPAL: força o GPS para o AR.js manualmente ──────────
      // O AR.js escuta o evento 'gps-camera-update-position' no documento.
      // Quando o watchPosition nativo dispara, emitimos esse evento manualmente
      // para garantir que o AR.js processe a posição mesmo no Android Chrome.
      let gpsOk = false;

      function emitirGPSParaARjs(lat, lng, accuracy) {
        // Emite o evento que o gps-new-camera espera
        window.dispatchEvent(new CustomEvent('gps-entity-place-update-positon', {
          detail: { position: { latitude: lat, longitude: lng } }
        }));

        // Também força via atributo direto na câmera como fallback
        const cam = document.getElementById('camera');
        if (cam && cam.components && cam.components['gps-new-camera']) {
          try {
            cam.components['gps-new-camera'].lastPosition = { latitude: lat, longitude: lng };
            cam.components['gps-new-camera'].currentCoords = { latitude: lat, longitude: lng };
          } catch(e) {}
        }
      }

      navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          const dist = calcDist(latitude, longitude, TARGET_LAT, TARGET_LNG).toFixed(0);
          log(`✅ GPS: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`);
          log(`📍 Precisão: ${accuracy.toFixed(0)}m | Distância: ${dist}m`);

          emitirGPSParaARjs(latitude, longitude, accuracy);

          if (!gpsOk) {
            gpsOk = true;
            log('✅ GPS conectado ao AR.js');
          }
        },
        (err) => {
          const msgs = {
            1: '❌ GPS negado — permita nas config do Chrome',
            2: '⚠️ GPS sem sinal — vá para área aberta',
            3: '⏱️ GPS timeout — aguarde...'
          };
          log(msgs[err.code] || `❌ GPS erro ${err.code}`);
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 }
      );

      // ── Log do modelo 3D ──────────────────────────────────────────────
      document.querySelector('#radio-model').addEventListener('model-loaded', () => {
        log('✅ Modelo 3D carregado');
      });
      document.querySelector('#radio-model').addEventListener('model-error', () => {
        log('❌ Erro no .glb — verifique o nome do arquivo');
      });
      document.querySelector('a-scene').addEventListener('loaded', () => {
        log('✅ Cena AR carregada');
      });

      // ── Supabase / Áudio ──────────────────────────────────────────────
      const supabase = window.supabase.createClient(
        'https://ppsdcoifaifrfgzovwwu.supabase.co',
        'sb_publishable_I1kgINGoMJ6h5UYt-q2Kyw_j7-ZP-Wv'
      );

      const audioPlayer = new Audio();
      const playBtn = document.getElementById('play-btn');
      playBtn.style.display = 'inline-block';

      async function carregarAudio() {
        try {
          const { data, error } = await supabase.from('mensagens').select('audio_url');
          if (error) throw error;
          if (data && data.length > 0) {
            const s = data[Math.floor(Math.random() * data.length)];
            audioPlayer.src = s.audio_url;
            audioPlayer.oncanplaythrough = () => {
              playBtn.innerText = '🔊 Ouvir Mensagem Aleatória';
            };
            log(`🎵 ${data.length} áudio(s) no banco`);
          } else {
            playBtn.innerText = 'Nenhuma mensagem';
          }
        } catch (e) {
          playBtn.innerText = 'Erro ❌';
          log('❌ Supabase: ' + e.message);
        }
      }

      playBtn.addEventListener('click', () => {
        if (audioPlayer.paused) {
          audioPlayer.play();
          playBtn.innerText = '⏸️ Pausar';
        } else {
          audioPlayer.pause();
          playBtn.innerText = '🔊 Ouvir Mensagem Aleatória';
        }
      });

      carregarAudio();
    </script>
  </body>
</html>
