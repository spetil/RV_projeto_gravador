<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Experiência de RA com Áudio</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      #debug-panel {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.82);
        color: #fff;
        font-family: monospace;
        font-size: 0.82rem;
        padding: 8px 12px;
        line-height: 1.7;
        pointer-events: none;
      }
      #gps-btn {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #ff2d55;
        color: white;
        border: none;
        border-radius: 50px;
        padding: 14px 28px;
        font-size: 1rem;
        font-family: monospace;
        font-weight: bold;
        cursor: pointer;
        display: none;
      }
      .ui-container {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        text-align: center;
      }
      #play-btn {
        background-color: #ff2d55;
        color: white;
        padding: 15px 30px;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-family: monospace;
        font-weight: bold;
        cursor: pointer;
        display: none;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body style="margin:0;overflow:hidden;">

    <div id="debug-panel">🔄 Iniciando...</div>
    <button id="gps-btn">📍 Permitir GPS e iniciar</button>

    <div class="ui-container">
      <button id="play-btn">Carregando voz... ⏳</button>
    </div>

    <a-scene
      vr-mode-ui='enabled: false'
      arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false'
      renderer='antialias: true; alpha: true'
      loading-screen='enabled: false'
    >
      <a-assets timeout="15000">
        <a-asset-item id="meu-modelo3d" src="vintage radio.glb"></a-asset-item>
      </a-assets>

      <a-camera id="camera" gps-new-camera='gpsMinDistance: 5'></a-camera>

      <a-box
        id="cubo"
        color="red"
        gps-new-entity-place="latitude: -4.466122627460742; longitude: -38.90073652916311"
        scale="5 5 5">
      </a-box>

      <a-entity
        id="radio-model"
        gltf-model="#meu-modelo3d"
        gps-new-entity-place="latitude: -4.466122627460742; longitude: -38.90073652916311"
        scale="5 5 5"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
      ></a-entity>
    </a-scene>

    <script>
      const log = (() => {
        const el = document.getElementById('debug-panel');
        const lines = [];
        return (msg) => {
          const time = new Date().toLocaleTimeString('pt-BR');
          lines.unshift(`[${time}] ${msg}`);
          if (lines.length > 8) lines.pop();
          el.innerHTML = lines.join('<br>');
        };
      })();

      log('🔄 Página carregada');

      // ── Permissão explícita de GPS no Android ─────────────────────────
      // No Android Chrome, às vezes o AR.js pede a permissão tarde demais
      // ou ela já foi negada. Pedimos antes de o A-Frame subir.
      const gpsBtn = document.getElementById('gps-btn');

      function iniciarGPS() {
        gpsBtn.style.display = 'none';
        log('📡 Solicitando GPS...');

        navigator.geolocation.watchPosition(
          (pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            const dist = calcDist(latitude, longitude,
              -4.466122627460742, -38.90073652916311).toFixed(0);
            log(`✅ GPS OK | precisão: ${accuracy.toFixed(0)}m | distância: ${dist}m`);
          },
          (err) => {
            const msgs = {
              1: '❌ GPS NEGADO — vá em Configurações do Chrome > Permissões do site > Localização e permita.',
              2: '⚠️ GPS indisponível (sem sinal).',
              3: '⏱️ GPS timeout — tente ao ar livre.'
            };
            log(msgs[err.code] || `❌ GPS erro ${err.code}`);
            gpsBtn.style.display = 'block';
            gpsBtn.innerText = '🔄 Tentar GPS novamente';
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
        );
      }

      gpsBtn.addEventListener('click', iniciarGPS);

      // Tenta automático; se falhar, mostra o botão
      if (navigator.geolocation) {
        gpsBtn.style.display = 'block'; // mostra como fallback imediato
        iniciarGPS();
      } else {
        log('❌ Este navegador não suporta GPS.');
      }

      // ── Cálculo de distância ──────────────────────────────────────────
      function calcDist(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dL = (lat2-lat1)*Math.PI/180;
        const dG = (lng2-lng1)*Math.PI/180;
        const a  = Math.sin(dL/2)**2 +
                   Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      // ── Eventos do modelo 3D ──────────────────────────────────────────
      document.querySelector('#meu-modelo3d').addEventListener('loaded', () => {
        log('✅ Arquivo .glb carregado');
      });
      document.querySelector('#radio-model').addEventListener('model-loaded', () => {
        log('✅ Modelo 3D renderizado na cena');
      });
      document.querySelector('#radio-model').addEventListener('model-error', () => {
        log('❌ Erro no .glb — confira o nome do arquivo no repositório');
      });

      // ── Evento da cena A-Frame ────────────────────────────────────────
      document.querySelector('a-scene').addEventListener('loaded', () => {
        log('✅ Cena A-Frame carregada');
      });

      // ── Supabase / Áudio ─────────────────────────────────────────────
      const supabaseUrl = 'https://ppsdcoifaifrfgzovwwu.supabase.co';
      const supabaseKey = 'sb_publishable_I1kgINGoMJ6h5UYt-q2Kyw_j7-ZP-Wv';
      const supabase    = window.supabase.createClient(supabaseUrl, supabaseKey);

      let audioPlayer   = new Audio();
      const playBtn     = document.getElementById('play-btn');
      playBtn.style.display = 'inline-block';

      async function carregarAudio() {
        try {
          const { data, error } = await supabase.from('mensagens').select('audio_url');
          if (error) throw error;
          if (data && data.length > 0) {
            const s = data[Math.floor(Math.random() * data.length)];
            audioPlayer.src = s.audio_url;
            audioPlayer.oncanplaythrough = () => {
              playBtn.innerText = '🔊 Ouvir Mensagem Aleatória';
            };
            log(`🎵 ${data.length} áudio(s) encontrado(s)`);
          } else {
            playBtn.innerText = 'Nenhuma mensagem';
            log('⚠️ Nenhum áudio no banco');
          }
        } catch (e) {
          playBtn.innerText = 'Erro de conexão ❌';
          log('❌ Supabase: ' + e.message);
        }
      }

      playBtn.addEventListener('click', () => {
        if (audioPlayer.paused) {
          audioPlayer.play();
          playBtn.innerText = '⏸️ Pausar';
        } else {
          audioPlayer.pause();
          playBtn.innerText = '🔊 Ouvir Mensagem Aleatória';
        }
      });

      carregarAudio();
    </script>
  </body>
</html>
