<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Experiência de RA com Áudio</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      #debug-panel {
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 9999;
        background: rgba(0,0,0,0.75);
        color: #fff;
        font-family: monospace;
        font-size: 0.8rem;
        padding: 6px 10px;
        line-height: 1.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body style="margin:0;overflow:hidden;">

    <div id="debug-panel">🔄 Aguardando GPS...</div>

    <a-scene
      vr-mode-ui='enabled: false'
      arjs='sourceType: webcam; videoTexture: true; debugUIEnabled: false'
      renderer='antialias: true; alpha: true'
      loading-screen='enabled: false'
    >
      <a-assets timeout="15000">
        <a-asset-item id="meu-modelo3d" src="vintage radio.glb"></a-asset-item>
      </a-assets>

      <a-camera gps-new-camera='gpsMinDistance: 5; positionMinAccuracy: 3000'></a-camera>

      <a-box
        color="red"
        gps-new-entity-place="latitude: -4.466122627460742; longitude: -38.90073652916311"
        scale="500 500 500">
      </a-box>

      <a-entity
        gltf-model="#meu-modelo3d"
        gps-new-entity-place="latitude: -4.466122627460742; longitude: -38.90073652916311"
        scale="500 500 500"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
      ></a-entity>
    </a-scene>

    <script>
      // ── Config ────────────────────────────────────────────────────────
      const TARGET_LAT = -4.466122627460742;
      const TARGET_LNG = -38.90073652916311;
      const RAIO_METROS = 3000; // distância máxima para tocar o áudio

      // ── Debug ─────────────────────────────────────────────────────────
      const debugEl = document.getElementById('debug-panel');
      function log(msg) { debugEl.innerHTML = msg; }

      // ── Distância ─────────────────────────────────────────────────────
      function calcDist(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const dL = (lat2 - lat1) * Math.PI / 180;
        const dG = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dL/2)**2 +
                  Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dG/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      // ── Estado ────────────────────────────────────────────────────────
      let fila = [];
      let indiceAtual = 0;
      let estaNoLocal = false;
      let estavaNoLocal = false; // valor anterior, pra detectar transição
      const audioPlayer = new Audio();

      // ── Supabase ──────────────────────────────────────────────────────
      const supabase = window.supabase.createClient(
        'https://ppsdcoifaifrfgzovwwu.supabase.co',
        'sb_publishable_I1kgINGoMJ6h5UYt-q2Kyw_j7-ZP-Wv'
      );

      function embaralhar(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      async function carregarFila() {
        try {
          const { data, error } = await supabase.from('mensagens').select('id, audio_url');
          if (error) throw error;
          if (data && data.length > 0) {
            fila = embaralhar([...data]);
            indiceAtual = 0;
          }
        } catch (e) {
          console.error('Erro ao carregar mensagens:', e);
        }
      }

      // ── Toca o próximo áudio da fila automaticamente ─────────────────
      function tocarProximo() {
        if (fila.length === 0) return;

        if (indiceAtual >= fila.length) {
          fila = embaralhar(fila);
          indiceAtual = 0;
        }

        const mensagem = fila[indiceAtual];
        audioPlayer.src = mensagem.audio_url;
        audioPlayer.play().catch(() => {
          // navegadores podem bloquear autoplay sem interação prévia;
          // nesse caso o áudio só tocará após o primeiro toque na tela
        });
      }

      // Quando um áudio termina, toca o próximo automaticamente (se ainda estiver no local)
      audioPlayer.addEventListener('ended', () => {
        indiceAtual++;
        if (estaNoLocal) {
          tocarProximo();
        }
      });

      // Desbloqueia autoplay no primeiro toque na tela (necessário em iOS/Android)
      let autoplayDesbloqueado = false;
      document.body.addEventListener('click', () => {
        if (!autoplayDesbloqueado) {
          autoplayDesbloqueado = true;
          if (estaNoLocal && audioPlayer.paused && !audioPlayer.src) {
            tocarProximo();
          }
        }
      }, { once: true });

      // ── GPS: controla play/pause conforme entra/sai do local ─────────
      navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          const dist = calcDist(latitude, longitude, TARGET_LAT, TARGET_LNG);
          const distFmt = dist.toFixed(0);
          const precFmt = accuracy.toFixed(0);

          estaNoLocal = dist <= RAIO_METROS;

          if (estaNoLocal) {
            log(`✅ GPS OK | precisão: ${precFmt}m | 📍 Na praça (${distFmt}m)`);
          } else {
            log(`✅ GPS OK | precisão: ${precFmt}m | 🚶 ${distFmt}m da praça`);
          }

          // Transição: ACABOU de chegar na praça → começa a tocar
          if (estaNoLocal && !estavaNoLocal) {
            if (audioPlayer.paused) {
              tocarProximo();
            }
          }

          // Transição: ACABOU de sair da praça → pausa
          if (!estaNoLocal && estavaNoLocal) {
            if (!audioPlayer.paused) {
              audioPlayer.pause();
            }
          }

          estavaNoLocal = estaNoLocal;
        },
        (err) => {
          log(`❌ GPS erro ${err.code}: ${err.message}`);
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 }
      );

      carregarFila();
    </script>
  </body>
</html>
