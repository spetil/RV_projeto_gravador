<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste GPS</title>
  <style>
    body { background: #000; color: #fff; font-family: monospace; padding: 20px; font-size: 1.1rem; }
    #resultado { margin-top: 20px; line-height: 2; }
    button { background: #ff2d55; color: white; border: none; padding: 14px 28px; border-radius: 50px; font-size: 1rem; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>
  <h2>🛰️ Teste de GPS</h2>
  <p>Toque no botão e veja se o GPS funciona neste dispositivo:</p>
  <button onclick="testarGPS()">📍 Testar GPS agora</button>
  <div id="resultado">Aguardando...</div>

  <script>
    function testarGPS() {
      const el = document.getElementById('resultado');
      el.innerHTML = '🔄 Solicitando GPS...';

      if (!navigator.geolocation) {
        el.innerHTML = '❌ GPS não suportado neste navegador.';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          el.innerHTML =
            '✅ GPS FUNCIONOU!<br>' +
            '📍 Latitude: ' + pos.coords.latitude.toFixed(6) + '<br>' +
            '📍 Longitude: ' + pos.coords.longitude.toFixed(6) + '<br>' +
            '🎯 Precisão: ' + pos.coords.accuracy.toFixed(0) + 'm';
        },
        (err) => {
          const msgs = {
            1: '❌ PERMISSÃO NEGADA<br>Vá em: Chrome > cadeado 🔒 > Permissões > Localização > Permitir',
            2: '⚠️ Posição indisponível (sem sinal GPS)',
            3: '⏱️ Timeout — tente ao ar livre ou aguarde'
          };
          el.innerHTML = (msgs[err.code] || '❌ Erro ' + err.code) + '<br><small>' + err.message + '</small>';
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }
  </script>
</body>
</html>
